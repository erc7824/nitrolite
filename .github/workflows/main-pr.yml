name: PR on main branch

on:
  pull_request:
    branches: [ main ]

jobs:
  test-clearnode:
    name: Test (Clearnode)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'clearnode/go.mod'
          cache: true
          cache-dependency-path: 'clearnode/go.sum'

      - name: Test
        run: go test -v ./...
        working-directory: clearnode

  test-forge:
    name: Test (Foundry)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FOUNDRY_PROFILE: ci
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version

      - name: Run Forge fmt
        run: forge fmt --check
        working-directory: contract
        id: fmt

      - name: Run Forge build
        run: forge build --sizes
        working-directory: contract
        id: build

      - name: Run Forge tests
        run: forge test -vvv
        working-directory: contract
        id: test

  test-sdk:
    name: Test (SDK)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'sdk/package.json'
          cache: 'npm'
          cache-dependency-path: 'sdk/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: sdk

      - name: Run tests
        run: npm test
        working-directory: sdk

  build-and-publish-clearnode:
    name: Build and Publish (Clearnode)
    needs: test-clearnode
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: clearnode
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/clearnode:${{ steps.sha.outputs.short_sha }}

  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: [test-clearnode, test-forge, test-sdk, build-and-publish-clearnode]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get commit info
        id: commit_info
        run: |
          echo "message=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --pretty=%an)" >> $GITHUB_OUTPUT

      - name: Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: deployments
          SLACK_USERNAME: CI/CD Bot
          SLACK_COLOR: ${{ contains(needs.*.result, 'failure') && 'failure' || contains(needs.*.result, 'cancelled') && 'cancelled' || 'success' }}
          SLACK_ICON_EMOJI: ${{ contains(needs.*.result, 'failure') && ':x:' || contains(needs.*.result, 'cancelled') && ':warning:' || ':white_check_mark:' }}
          SLACK_TITLE: 'Nitrolite PR Tests'
          SLACK_MESSAGE_ON_SUCCESS: |
            ✅ All PR tests passed successfully!
            
            📝 Commit: ${{ steps.commit_info.outputs.message }}
            👤 Author: ${{ steps.commit_info.outputs.author }}
          SLACK_MESSAGE_ON_FAILURE: |
            ❌ PR tests failed!
            
            📝 Commit: ${{ steps.commit_info.outputs.message }}
            👤 Author: ${{ steps.commit_info.outputs.author }}
          SLACK_MESSAGE_ON_CANCEL: |
            ⚠️ PR tests were cancelled!
            
            📝 Commit: ${{ steps.commit_info.outputs.message }}
            👤 Author: ${{ steps.commit_info.outputs.author }}
          SLACK_FOOTER: 'Nitrolite CI/CD Pipeline'
